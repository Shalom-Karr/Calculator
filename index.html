<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline CSS Calculator</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f0f2f5; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <!-- Calculator Container -->
    <div style="width: 280px; background-color: #2f3640; padding: 20px; border-radius: 15px; box-shadow: 0px 10px 20px rgba(0,0,0,0.3);">
        
        <!-- Display Screen -->
        <input type="text" id="display" readonly style="width: 100%; height: 60px; font-size: 32px; text-align: right; margin-bottom: 20px; background-color: #dcdde1; border: none; border-radius: 8px; padding: 10px; box-sizing: border-box; color: #2f3640; box-shadow: inset 0px 2px 5px rgba(0,0,0,0.2);">

        <!-- Buttons Grid -->
        <div style="display: flex; flex-wrap: wrap; justify-content: space-between;">
            
            <!-- Row 1 -->
            <button onclick="clearDisplay()" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #e84118; color: white; box-shadow: 0px 4px #c23616;">C</button>
            <button onclick="appendToDisplay('(')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #718093; color: white; box-shadow: 0px 4px #576574;">(</button>
            <button onclick="appendToDisplay(')')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #718093; color: white; box-shadow: 0px 4px #576574;">)</button>
            <button onclick="appendToDisplay('/')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #fbc531; color: #2f3640; box-shadow: 0px 4px #e1b12c; font-weight: bold;">/</button>

            <!-- Row 2 -->
            <button onclick="appendToDisplay('7')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">7</button>
            <button onclick="appendToDisplay('8')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">8</button>
            <button onclick="appendToDisplay('9')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">9</button>
            <button onclick="appendToDisplay('*')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #fbc531; color: #2f3640; box-shadow: 0px 4px #e1b12c; font-weight: bold;">*</button>

            <!-- Row 3 -->
            <button onclick="appendToDisplay('4')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">4</button>
            <button onclick="appendToDisplay('5')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">5</button>
            <button onclick="appendToDisplay('6')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">6</button>
            <button onclick="appendToDisplay('-')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #fbc531; color: #2f3640; box-shadow: 0px 4px #e1b12c; font-weight: bold;">-</button>

            <!-- Row 4 -->
            <button onclick="appendToDisplay('1')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">1</button>
            <button onclick="appendToDisplay('2')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">2</button>
            <button onclick="appendToDisplay('3')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">3</button>
            <button onclick="appendToDisplay('+')" style="width: 60px; height: 60px; font-size: 22px; margin-bottom: 10px; border: none; border-radius: 10px; cursor: pointer; background-color: #fbc531; color: #2f3640; box-shadow: 0px 4px #e1b12c; font-weight: bold;">+</button>

            <!-- Row 5 -->
            <button onclick="appendToDisplay('0')" style="width: 130px; height: 60px; font-size: 22px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">0</button>
            <button onclick="appendToDisplay('.')" style="width: 60px; height: 60px; font-size: 22px; border: none; border-radius: 10px; cursor: pointer; background-color: #353b48; color: white; box-shadow: 0px 4px #2f3640;">.</button>
            <button onclick="calculateResult()" style="width: 60px; height: 60px; font-size: 22px; border: none; border-radius: 10px; cursor: pointer; background-color: #4cd137; color: white; box-shadow: 0px 4px #44bd32; font-weight: bold;">=</button>

        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // Get the display element
        const display = document.getElementById('display');

        // Function to add numbers/operators to the screen
        function appendToDisplay(value) {
            // Prevent adding errors to the calculation
            if (display.value === 'Error') {
                display.value = '';
            }
            display.value += value;
        }

        // Function to clear the screen
        function clearDisplay() {
            display.value = '';
        }

        // Function to calculate the math
        function calculateResult() {
            try {
                // eval() processes the string as math. 
                // Only safe here because we only allow controlled inputs via buttons.
                if(display.value !== "") {
                    let result = eval(display.value);
                    
                    // Prevent giant decimals
                    if(result % 1 !== 0) {
                        result = result.toFixed(4);
                        // Remove trailing zeros
                        result = parseFloat(result); 
                    }
                    display.value = result;
                }
            } catch (error) {
                // If the math is invalid (e.g., 5++5), show an error
                display.value = 'Error';
            }
        }
    </script>

</body>
</html>
